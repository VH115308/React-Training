<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Document</title>
</head>

<body>
    <h2>Kanban Board</h2>
    <div class="board">
        <div class="column" data-status="todo">
            <h3>To Do</h3>
            <div class="tasks"></div>
            <div class="add-task">
                <input type="text" placeholder="New task...">
                <button>Add</button>
            </div>
        </div>
        <div class="column" data-status="inprogress">
            <h3>In Progress</h3>
            <div class="tasks"></div>
            <div class="add-task">
                <input type="text" placeholder="New task...">
                <button>Add</button>
            </div>
        </div>
        <div class="column" data-status="done">
            <h3>Done</h3>
            <div class="tasks"></div>
            <div class="add-task">
                <input type="text" placeholder="New task...">
                <button>Add</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
